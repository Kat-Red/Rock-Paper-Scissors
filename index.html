<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		*{
			margin: 0;
			padding: 0;
			color: white;
			background: black;
		}
		button{
			width:10%;
			padding: 16px;
			margin: 8px;
			min-width: fit-content;
			font-weight: bold;
			border-radius: 20px;
		}
		button:hover{
			background: #eee;
			color: black;
		}
		main{
			padding-top: 30px;
			display: flex;
			flex-direction: column;
			gap: 20px;
		}
	</style>
	<title>Rock Paper Scissors</title>
</head>
<body>
	<main>
		<h1>Rock Paper Scissors Game!</h1>
		<section id="game">
			<div id="selection">
			</div>
		</section>
			<div id="score">
				<h2>Score:</h2>
				<p>Human: <span id="human">0</span></p>
				<p>Computer: <span id="computer">0</span></p>
			</div>
		
	</main>
<script src="./script.js"></script>
</body>
</html>
